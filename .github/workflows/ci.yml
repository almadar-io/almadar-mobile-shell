name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  validate-template:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Validate shell structure
        run: |
          # Check required shell files exist
          test -f shell.toml || (echo "Missing shell.toml" && exit 1)
          test -f component-mapping.json || (echo "Missing component-mapping.json" && exit 1)
          test -d packages/mobile || (echo "Missing packages/mobile" && exit 1)
          test -d packages/server || (echo "Missing packages/server" && exit 1)
          echo "✓ All required template files present"
      
      - name: Validate shell.toml syntax
        run: |
          # Basic TOML validation - check for required sections
          grep -q "\[shell\]" shell.toml || (echo "Missing [shell] section" && exit 1)
          grep -q "name" shell.toml || (echo "Missing name in shell.toml" && exit 1)
          grep -q "version" shell.toml || (echo "Missing version in shell.toml" && exit 1)
          echo "✓ shell.toml is valid"
      
      - name: Validate component mapping
        run: |
          # Check component-mapping.json is valid JSON
          python3 -c "import json; json.load(open('component-mapping.json'))" || (echo "Invalid component-mapping.json" && exit 1)
          echo "✓ component-mapping.json is valid JSON"
      
      - name: Check source files
        run: |
          # Check that mobile and server packages have source files
          test -d packages/mobile/src || (echo "Missing packages/mobile/src" && exit 1)
          test -d packages/server/src || (echo "Missing packages/server/src" && exit 1)
          echo "✓ Source directories present"
